<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DriveSync — Guide d'utilisation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080f14;
      --surface: #0d1b26;
      --border: #1a2e3d;
      --cyan: #00d4ff;
      --cyan-dim: rgba(0, 212, 255, 0.12);
      --cyan-glow: rgba(0, 212, 255, 0.25);
      --white: #f0f6ff;
      --muted: #5a7a8a;
      --font-display: 'Syne', sans-serif;
      --font-title: 'Outfit', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-display);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,15,20,0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }

    .logo-text {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--white);
    }

    .logo-text span { color: var(--cyan); }

    .step-counter {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .step-counter strong {
      color: var(--cyan);
      font-size: 1rem;
    }

    /* ── PROGRESS BAR ── */
    .progress-bar {
      position: sticky;
      top: 73px;
      z-index: 10;
      height: 3px;
      background: var(--border);
    }

    .progress-fill {
      height: 100%;
      background: var(--cyan);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 12px var(--cyan-glow);
    }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1500px;
      margin: 0 auto;
      padding: 72px 64px 140px;
    }

    @media (max-width: 1100px) {
      main { padding: 60px 32px 120px; }
    }

    /* ── STEP CARD ── */
    .step-card {
      display: none;
      animation: fadeSlide 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .step-card.active { display: block; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .step-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--cyan);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .step-tag::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--cyan);
    }

    .step-title {
      font-family: var(--font-title);
      font-size: clamp(2.2rem, 4.2vw, 3.6rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
      color: var(--white);
    }

    .step-description {
      font-family: var(--font-title);
      font-size: 1.15rem;
      font-weight: 400;
      line-height: 1.75;
      color: #9ec0d0;
      margin-bottom: 48px;
      max-width: 880px;
    }

    /* ── IMAGES ── */
    .images-grid {
      display: grid;
      gap: 24px;
      margin-bottom: 56px;
    }

    .images-grid.one   { grid-template-columns: 1fr; }
    .images-grid.two   { grid-template-columns: 1fr 1fr; }
    .images-grid.three { grid-template-columns: 1fr 1fr 1fr; }

    .images-grid.one .img-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    .img-wrapper {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
      transition: border-color 0.2s, transform 0.2s;
    }

    .img-wrapper:hover {
      border-color: var(--cyan);
      transform: translateY(-2px);
    }

    .img-wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Placeholder quand pas d'image */
    .img-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--surface);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }

    .img-placeholder .icon {
      font-size: 2rem;
      opacity: 0.4;
    }

    .img-caption {
      padding: 10px 14px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      letter-spacing: 0.05em;
    }

    /* ── NAVIGATION ── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      text-transform: uppercase;
    }

    .btn-prev {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn-prev:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .btn-next {
      background: var(--cyan);
      color: var(--bg);
    }

    .btn-next:hover {
      background: #00eeff;
      box-shadow: 0 0 24px var(--cyan-glow);
      transform: translateX(2px);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* Dots */
    .dots {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 300px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .dot.active {
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
      transform: scale(1.3);
    }

    /* ── FINISH CARD ── */
    .finish-card {
      text-align: center;
      padding: 60px 24px;
    }

    .finish-icon {
      font-size: 4rem;
      margin-bottom: 24px;
    }

    .finish-card h2 {
      font-family: var(--font-title);
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--cyan);
      margin-bottom: 16px;
    }

    .finish-card p {
      color: #8aacbc;
      font-size: 1.05rem;
      margin-bottom: 32px;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 36px;
      background: var(--cyan);
      color: var(--bg);
      border-radius: 8px;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: all 0.2s;
    }

    .btn-download:hover {
      background: #00eeff;
      box-shadow: 0 0 32px var(--cyan-glow);
    }

    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      main { padding: 40px 16px 80px; }
      .images-grid { gap: 16px; }
      .images-grid.two,
      .images-grid.three { grid-template-columns: 1fr; }
      .btn { padding: 12px 18px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <!-- Remplace src par le chemin de ton logo -->
    <img src="assets/logo.png" alt="DriveSync" onerror="this.style.display='none'"/>
    <span class="logo-text">Drive<span>Sync</span></span>
  </div>
  <div class="step-counter">
    Step <strong id="currentStepNum">1</strong> / <strong id="totalSteps">1</strong>
  </div>
</header>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<main id="stepsContainer"></main>

<script>
// ═══════════════════════════════════════════════════════════════
//  AJOUTE TES ÉTAPES ICI
//  Chaque étape = un objet avec :
//    - title      : titre de l'étape
//    - description: explication de ce que l'user doit faire
//    - images     : tableau de 1, 2 ou 3 images
//                   { src: "chemin/image.png", caption: "légende (optionnel)" }
// ═══════════════════════════════════════════════════════════════
const steps = [

  {
    title: "Télécharger DriveSync",
    description: "Rendez-vous sur la page GitHub Releases ou via ce lien <a href='https://github.com/Ferdinaelectro1/DriveSync/releases/' target='_blank' style='color:#00d4ff;'>Download DriveSync</a> et téléchargez la version correspondant à votre système — AppImage pour Linux, ZIP pour Windows.",
    images: [
      { src: "assets/github1.png", caption: "Page GitHub Releases" },
      { src: "assets/github2.png", caption: "Releases par platform  Linux ou windows" }
    ]
  },

  {
    title: "Lancer l'application",
    description: "Sur Linux, rendez le fichier exécutable puis lancez-le. Sur Windows, extrayez le ZIP et double-cliquez sur DriveSync.exe.",
    images: [
      { src: "assets/linux1.png", caption: "Linux — chmod +x" },
      { src: "assets/linux2.png", caption: "Linux — chmod +x" },
      { src: "assets/linux3.png", caption: "Linux — chmod +x" },
      { src: "assets/win1.png", caption: "Windows — double-clic" },
      { src: "assets/win2.png", caption: "Windows — Extraction du ZIP" },
      { src: "assets/win3.png", caption: "Windows — Fichier extrait. Lancer l'application en cliquant sur DriveSync.exe" }
    ]
  },

  {
     title: "Sélectionner le dossier à synchroniser",
     description: "Cliquez sur 'Parcourir' et choisissez le dossier que vous souhaitez synchroniser avec Google Drive. DriveSync surveillera ce dossier et synchronisera automatiquement les fichiers qu'il contient.",
     images: [
       { src: "assets/1.png", caption: "Interface de DriveSync" },
       { src: "assets/3.png", caption: "Choix du dossier" },
       { src: "assets/4.png", caption: "Validation et chemin affiché dans l'interface" },
     ]
 },

   {
     title: "Connecter votre compte Google",
     description: "Cliquez sur 'Connecter avec Google' et choisissez le compte Google que vous souhaitez utiliser. Ceci afin de permettre à DriveSync d'accéder à votre Google Drive et de synchroniser vos fichiers.",
     images: [
       { src: "assets/5.png", caption: "Une fenêtre de connexion s'ouvre dans votre navigateur" },
       { src: "assets/6.png", caption: "Choissisez votre compte" },
       { src: "assets/7.png", caption: "Vous atterisez sur cette page. Cliquez sur 'Paramètres avancés'" },
     ]
   },
   {
     title: "Autoriser l'accès à DriveSync",
     description: "Validez l'accès à DriveSync en passant par les paramètres avancés, puis confirmez l'autorisation. Une fois ces étapes terminées, votre compte Google sera connecté à l'application. À noter que l'application étant encore en mode test et pas encore validé par google, il est normal que vous ayez un message d'avertissement de sécurité. DriveSync est 100% sûr, il suffit de suivre les étapes pour autoriser l'accès.",
     images: [
       { src: "assets/8.png", caption: "Cliquez sur 'Accéder à DriveSync (non sécurisé)'." },
       { src: "assets/9.png", caption: "Cliquez sur 'Continuer'." },
       { src: "assets/10.png", caption: "Vous atterissez sur cette Page. Votre compte Google est maintenant connecté." },
     ]
   },
   {
     title: "Retour à l'application",
     description: "Nous revenons sur l'application afin de démarrer la synchronisation.",
     images: [
       { src: "assets/11.png", caption: "Vous verrez sur l'interface que votre compte Google est connecté." },
       { src: "assets/11.png", caption: "Vous cliquez sur le boutton 'Demarrer' pour démarrer la synchronisation." },
     ]
   },
   {
     title: "L'application est maintenant démarré et tourne en arrière-plan",
     description: "Vous verrez que l'app a démarré et tourne en arrière plan dans la barre des tâches (Windows) ou la barre de menu (Linux). DriveSync continuera à tourner et synchroniser vos fichiers. Vous pouvez couper la synchronisation à tout moment en cliquant sur 'Arrêter' dans cette barre des tâches ou de menu.",
     images: [
       { src: "assets/12.png", caption: "Linux — Barre des menus" },
       { src: "assets/13.png", caption: "Linux — Vous cliquez sur arrêter pour arrêter la synchronisation." },
       { src: "assets/win_menu.png", caption: "Windows — Barre des tâches" },
     ]
   },
   {
     title: "Testez la synchronisation",
     description: "Rendez vous sur votre Google Drive, puis dans la section 'My Drive' vous devriez voir un dossier 'NomDossierLocal-dv' , c'est à dire le nom de votre dossier local suivi du suffixe '-dv'. Ex: Si le dossier que vous avez choisi à synchroniser est 'Mes Documents', vous verrez un dossier 'Mes Documents-dv'. Tout fichier que vous ajoutez dans le dossier que vous avez choisi à l'étape 3 sera automatiquement synchronisé et apparaîtra dans ce dossier DriveSync sur votre Google Drive.",
     images: [
       { src: "assets/15.png", caption: "Section My Drive sur Google Drive" },
       { src: "assets/17.png", caption: "Exemple de dossier synchronisé. On voit bien le suffixe '-dv'" },
     ]
   },
   {
        title: "Testez la synchronisation (suite)",
        description: "Dans votre dossier local que vous avez choisi à l'étape 3, ajoutez un fichier (ex: 'test.rs'). Vous verrez que ce fichier est automatiquement synchronisé et apparaît dans le dossier sur votre Google Drive.",
        images: [
            { src: "assets/18.png", caption: "Copions un fichier nommé 'test.rs' dans le dossier local" },
            { src: "assets/19.png", caption: "Le fichier est automatiquement synchronisé sur Google Drive. Nous voyons le fichier apparaître dans le dossier sur notre google drive." },
        ]
    },
    {
        title: "Testez avec un autre type de fichier",
        description: "Essayons maintenant avec un fichier image. Ajoutez un fichier 'images.jpeg' dans le dossier local — peu importe le type de fichier, DriveSync le synchronisera automatiquement sur votre Google Drive.",
        images: [
            { src: "assets/20.png", caption: "Copions un autre fichier nommé 'images.jpeg' dans le dossier local" },
            { src: "assets/21.png", caption: "Le fichier 'images.jpeg' est automatiquement synchronisé sur Google Drive et apparaît dans le dossier sur notre google drive." },
        ]
    },
    {
        title: "Testons la synchronisation (suite), testons la suppression de fichiers",
        description: "Dans votre dossier local que vous avez choisi à l'étape 3, supprimez un fichier (ex: 'test.rs'). Vous verrez que ce fichier est automatiquement supprimé sur Google Drive.",
        images: [
            { src: "assets/22.png", caption: "Supprimons le fichier 'images.jpeg' du dossier local" },
            { src: "assets/23.png", caption: "Le fichier est automatiquement supprimé sur Google Drive." },
        ]
    },
    {
        title: "Arrêter la synchronisation",
        description: "Pour arrêter la synchronisation, cliquez sur l'icône de DriveSync dans la barre des tâches (Windows) ou la barre de menu (Linux), puis cliquez sur 'Arrêter'. Cela arrêtera la synchronisation et fermera l'application. Vous pouvez redémarrer la synchronisation à tout moment en relançant l'application.",
        images: [
            { src: "assets/24.png", caption: "Cliquez sur 'Arrêter la synchronisation' pour mettre fin à la synchronisation." },
            { src: "assets/25.png", caption: "La synchronisation est arrêtée." },
        ]
    },
];

// ── MOTEUR ──────────────────────────────────────────────────────
let current = 0;

function buildSteps() {
  const container = document.getElementById('stepsContainer');
  document.getElementById('totalSteps').textContent = steps.length;

  steps.forEach((step, i) => {
    const cols = step.images.length === 1 ? 'one' : step.images.length === 2 ? 'two' : 'three';
    const imagesHtml = step.images.map(img => `
      <div class="img-wrapper">
        <img src="${img.src}" alt="${img.caption || step.title}"
          onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'><div class=\\'icon\\'>🖼</div><span>${img.src}</span></div>${img.caption ? `<div class=\\'img-caption\\'>${img.caption}</div>` : ''}'"/>
        ${img.caption ? `<div class="img-caption">${img.caption}</div>` : ''}
      </div>
    `).join('');

    const card = document.createElement('div');
    card.className = 'step-card' + (i === 0 ? ' active' : '');
    card.id = `step-${i}`;
    card.innerHTML = `
      <div class="step-tag">Étape ${i + 1} sur ${steps.length}</div>
      <h1 class="step-title">${step.title}</h1>
      <p class="step-description">${step.description}</p>
      <div class="images-grid ${cols}">${imagesHtml}</div>
      <nav class="nav">
        <button class="btn btn-prev" onclick="goTo(${i - 1})" ${i === 0 ? 'disabled' : ''}>
          ← Précédent
        </button>
        <div class="dots" id="dots-${i}"></div>
        ${i < steps.length - 1
          ? `<button class="btn btn-next" onclick="goTo(${i + 1})">Suivant →</button>`
          : `<button class="btn btn-next" onclick="showFinish()">Terminer ✓</button>`
        }
      </nav>
    `;
    container.appendChild(card);
  });

  // Finish card
  const finish = document.createElement('div');
  finish.className = 'step-card';
  finish.id = 'step-finish';
  finish.innerHTML = `
    <div class="finish-card">
      <div class="finish-icon">🎉</div>
      <h2>Vous êtes prêt !</h2>
      <p>DriveSync surveille votre dossier et synchronise automatiquement<br/>vos fichiers vers Google Drive en temps réel.</p>
      <a class="btn-download" href="https://github.com/Ferdinaelectro1/DriveSync/releases" target="_blank">
        ↓ Télécharger DriveSync
      </a>
    </div>
  `;
  container.appendChild(finish);

  buildDots();
  updateUI();
}

function buildDots() {
  steps.forEach((_, i) => {
    const dotsEl = document.getElementById(`dots-${i}`);
    if (!dotsEl) return;
    steps.forEach((_, j) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (j === i ? ' active' : '');
      dot.onclick = () => goTo(j);
      dotsEl.appendChild(dot);
    });
  });
}

function goTo(index) {
  if (index < 0 || index >= steps.length) return;
  document.getElementById(`step-${current}`).classList.remove('active');
  current = index;
  document.getElementById(`step-${current}`).classList.add('active');
  updateUI();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showFinish() {
  document.getElementById(`step-${current}`).classList.remove('active');
  document.getElementById('step-finish').classList.add('active');
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('currentStepNum').textContent = steps.length;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateUI() {
  const pct = ((current + 1) / steps.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('currentStepNum').textContent = current + 1;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(current - 1);
});

buildSteps();
</script>
</body>
</html>
